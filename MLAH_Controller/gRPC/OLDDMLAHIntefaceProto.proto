syntax = "proto3";

package MLAHInterop;
// server -> client : Responce
// client -> server : Request

// RL
message InitEpisodeResponse
{
	string message = 1;
}

message InitEpisodeRequest
{
	string message = 1;
}

message EndEpisodeResponse
{
	string message = 1;
}

message EndEpisodeRequest
{
	string message = 1;
}

message DisconnectRequest
{
	string message = 1;
}

message EndSimulationResponse
{
	string message = 1;
}

message ScenarioRequest
{
	// entity create ok
	string message = 1;
}

message ScenarioResponse
{
	// location rotation velocity
	string type = 1;			// UAV, Helicopter
	string subtype = 2;
	int32 id = 3;
	string identify = 4;

	LLAPosition location = 5;
	Orientation rotation = 6;
	Velocity velocity = 7;

	double health = 8;

	double fuel = 9;
	double fuel_comsumption = 10;

	// helicopter
	int32 auto_attack_flag = 11;
	int32 atgm_round = 12;
	int32 hydra_round = 13;
	int32 minigun_round = 14;
	double atgm_direct_damage = 15;
	double atgm_explosion_damage = 16;
	double atgm_direct_accuracy = 17;
	double atgm_explosion_accuracy = 18;
	double hydra_direct_damage = 19;
	double hydra_explosion_damage = 20;
	double hydra_direct_accuracy = 21;
	double hydra_explosion_accuracy = 22;
	double minigun_damage = 23;
	double minigun_accuracy = 24;
	
	// UAV
	string camera_type = 25;
	double recognition_pixel = 26;
	double detection_pixel = 27;

	// target
	double target_damage = 28;
	double target_attack_range = 29;
	double target_detect_range = 30;
	double target_attack_delay = 31;
	double target_attack_accuracy = 32;
	double target_attack_midpoint = 33;
	double target_attack_steepness = 34;

	enumInputStatus inputstatus = 35;

	bool next_scenario = 36;
}

message ObservationRequest
{
	string message = 1;

	double simulationtime = 2;

	repeated ObservationHelicopterInfo	helicopters = 3;
	repeated ObservationUAVInfo			uavs = 4;
	repeated ObservationTargetInfo		targets = 5;
}

