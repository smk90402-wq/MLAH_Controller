message ScenarioMissionRequest
{
	string name = 1;

	string type = 2;
	int32 id = 3;

	int32 missionID = 4;
	int32 waypointID = 5;
}

message ScenarioMissionResponse
{
	string message = 1;
	repeated ScenarioMission missionList = 2;
}

message ScenarioMission
{
	string type = 1;
	int32 id = 2;

	enumMissionType mission_type = 3;
	int32 waypointpasstype = 4;			// 0 - fly over/ 1 - fly by
	int32 onwaittime = 5;				// -1 - infinite wait / 0 - next mission / >0 time wait
	Vector4 mission = 6;
	
	CameraAction cameramission = 7;

	int32 missionID = 8;
	int32 waypointID = 9;
}

message UpdateEntity
{
	string message = 1;
	repeated UpdateEntityInfo entityList = 2;
}

message UpdateEntityInfo
{
	string type = 1;
	string subtype = 2;
	int32 id = 3;

	LLAPosition location = 4;
	Orientation rotation = 5;
	Velocity velocity = 6;
	
	string camera_type = 7;
	CameraAction camera_rotation = 8;
}

message SWBit
{
	string message = 1;
}

message NextMissionResponse
{
	string message = 1;

	string type = 2;
	int32 id = 3;
}

message UAVStatusResponse
{
	string message = 1;

	int32 id = 2;

	LLAPosition		UAVLocation = 3;
	Orientation		UAVRotation = 4;

	int32			SensorType = 5;				// 0 none 1 eo 2 ir
	Orientation		SensorAttitude = 6;	
	double			fov = 7;
	LLAPosition		CenterCoordinate = 8;
}

message UAVStatusControlResponse
{
	string message = 1;

	int32 id = 2;

	LLAPosition		UAVLocation = 3;
	Orientation		UAVRotation = 4;

	int32			SensorType = 5;				// 0 none 1 eo 2 ir
	Orientation		SensorAttitude = 6;	
	double			fov = 7;
	LLAPosition		CenterCoordinate = 8;
}

enum enumMissionType
{
	MISSION_MOVETOGPS = 0;
	MISSION_LOITER = 1;
	MISSION_HOLDING = 2;
	MISSION_ATTACKTO_ATGM = 3;
	MISSION_ATTACKTO_HYDRA = 4;
	MISSION_ATTACKTO_MINIGUN = 5;
	MISSION_NONE = 6;
}

message LLAPosition
{
    double latitude = 1;
    double longitude = 2;
    double altitude = 3;
}

message UnrealPosition
{
    double x = 1;
    double y = 2;
    double z = 3;
}

message Orientation
{
    float psi = 1;      // Roll
    float theta = 2;    // Pitch
    float phi = 3;      // Yaw
}

message Velocity
{
    float u = 1;        // forward
    float v = 2;        // right
    float w = 3;        // down
}

message Vector4
{
	double x = 1;
	double y = 2;
	double z = 3;
	double w = 4;
}

message CameraAction
{
	int32 mode = 1;	
	
	double fov = 2;
	
	double x = 3;
	double y = 4;
	double z = 5;
	double w = 6;

	double sweeptime = 7;
}

message ChangeHealthResponse
{
	int32 id = 1;
	double health = 2;
}

message ChangeFuelResponse
{
	int32 id = 1;
	double fuel = 2;
}

message ChangeDataLinkResponse
{
	int32 id = 1;
	int32 link = 2;		// 0 - all, 1 - 4, 2 - 5, 3 - 6, 4 - (4,5), 5 - (4,6), 6 - (5,6)
}

message ChangeSensorResponse
{
	int32 id = 1;
	int32 sensor = 2;	// 0 - use, 1 - not use(destroy)
}

message ChangeTimeDilationResponse
{
	int32 timedilation = 1;
}

message CoperationTimeInformation
{
	double coperationtime = 1;
}

message IndividualTimeInformation
{
	int32 id = 1;
	double individualtime = 2;
}

message ChangeEnvironmentResponse
{
	double time = 1;		// 0 ~ 2400
	int32 weather_mode = 2; // 0 ~ 10
	/*
	0 clear_skies
	1 cloudy
	2 foggy
	3 overcast
	4 partly_cloudy
	5 rain
	6 rain_light
	7 rain_thunderstorm
	8 sand_dust_calm
	9 sand_dust_storm
	10 snow
	11 snow_blizzard
	12 snow_light
	*/
	int32 season_mode = 3;  // 0 ~ 3
}
