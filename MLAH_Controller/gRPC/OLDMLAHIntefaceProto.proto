message ObservationHelicopterInfo
{
	string type = 1;
	string subtype = 2;
	int32 id = 3;

	LLAPosition location = 4;
	Orientation rotation = 5;
	Velocity velocity = 6;

	double health = 7;
	double fuel = 8;

	bool done = 9;
	// != 0 ? true : false

	LLAPosition current_waypoint = 10;
	bool waypoint_done = 11;
	
	int32 atgm_round = 12;
	int32 hydra_round = 13;
	int32 minigun_round = 14;

	enumEntityStatus status = 15; 
	
	int32 missionID = 16;
	int32 waypointID = 17;
	
	EntityAbnormalCause abnormalcause = 18;

	UnrealPosition unreallocation = 19;
}

message ObservationUAVInfo
{
	string type = 1;
	string subtype = 2;
	int32 id = 3;

	LLAPosition location = 4;
	Orientation rotation = 5;
	Velocity velocity = 6;

	double health = 7;
	double fuel = 8;	

	bool done = 9;

	LLAPosition current_waypoint = 10;
	bool waypoint_done = 11;

	string camera_type = 12;
	repeated LLAPosition camera_goal_position = 13;
	double camera_vfov = 14;
	double camera_hfov = 15;
	double camera_dfov = 16;
	double camera_hypoenuse = 17;
	
	// 상황인지 데이터
	repeated ObservationTargetInfo detected_target_info = 18;
	repeated ObservationInterestRegion interest_region_info = 19;

	ObservationSimulationInfo simulation_info = 20;
	
	// Status
	enumEntityStatus status = 21; 

	int32 missionID = 22;
	int32 waypointID = 23;

	EntityAbnormalCause abnormalcause = 24;

	UnrealPosition unreallocation = 25;
}

message ObservationTargetInfo
{
	string type = 1;
	string subtype = 2;
	int32 id = 3;

	LLAPosition location = 4;
	Orientation rotation = 5;
	Velocity velocity = 6;
	
	double health = 7;
	double fuel = 8;	

	bool done = 9;

	enumEntityStatus status = 10; 

	int32 missionID = 11;
	int32 waypointID = 12;

	UnrealPosition unreallocation = 13;
}

message ObservationInterestRegion
{
	int32 id = 1;

	LLAPosition location = 2;
}

message ObservationSimulationInfo
{
	// 상황인지 데이터
	string name = 1;
}

enum enumInputStatus
{
	STATUS_MISSION = 0;
	STATUS_CONTROL = 1;
	STATUS_RL = 2;
	STATUS_VF = 3;
}

enum enumEntityStatus
{
	/*
	STATUS_MISSION = 0;
	STATUS_FLIGHT = 1;
	STATUS_LOITER = 2;
	STATUS_HOLDING = 3;
	STATUS_ATTACK = 4;
	STATUS_DEATH = 5;
	STATUS_TRACKING = 6;
	STATUS_CONTROL = 7;
	*/
	STATUS_FLIGHT = 0;
	STATUS_WAIT = 1;
	STATUS_ATTACK = 2;
	STATUS_DEATH = 3;
}

message EntityAbnormalCause
{
	int32 hit = 1;
	int32 loss_1 = 2;
	int32 loss_2 = 3;
	int32 loss_3 = 4;
	int32 fuelwarning = 5;
	int32 fueldenger = 6;
	int32 fuelzero = 7;
	int32 crash = 8;
	int32 sensor = 9;
	
}

message ActionResponse
{
	repeated ActionEntityinfo entityinfo = 1;
}

message ActionEntityinfo
{
	string type = 1;
	int32 id = 2;

	bool done = 3;

	enumActionType action_type = 4;
	Vector4 action = 5;
	/*
	enumMoveActionType moveaction_type = 4;
	Vector4 moveaction = 5;

	enumAttackActionType attackaction_type = 6;
	Vector4 attackaction = 7;
	*/

	CameraAction cameraaction = 6;
}

enum enumActionType
{
	ACTION_MOVETOGPS = 0;
	ACTION_LOITER = 1;
	ACTION_HOLDING = 2;
	ACTION_ATTACKTO_ATGM = 3;
	ACTION_ATTACKTO_HYDRA = 4;
	ACTION_ATTACKTO_MINIGUN = 5;
	ACTION_NONE = 6;
}

